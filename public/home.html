<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Group Golf Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="admin.html" target="_blank" style="position:fixed;top:18px;right:24px;z-index:1000;background:#475569;color:#fff;padding:7px 16px;border-radius:8px;text-decoration:none;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.18);font-weight:600;transition:background 0.2s;" onmouseover="this.style.background='#334155'" onmouseout="this.style.background='#475569'">⚙️ Admin</a>
  <div class="container">
    <h1>Multi-Group Golf Events</h1>
    <p>Welcome! Enter your group access code to view your group’s events.</p>
    <form id="accessForm">
      <input type="text" id="accessCode" placeholder="Access Code" maxlength="8" required>
      <button type="submit">Enter</button>
    </form>
    <div id="error" class="error"></div>
  </div>
  <script src="home.js"></script>
</body>
</html>
