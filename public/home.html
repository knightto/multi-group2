<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Group Golf Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Multi-Group Golf Events</h1>
    <p>Welcome! Enter your group access code to view your group’s events.</p>
    <form id="accessForm">
      <input type="text" id="accessCode" placeholder="Access Code" maxlength="8" required>
      <button type="submit">Enter</button>
    </form>
    <div id="error" class="error"></div>
  </div>
  <script src="home.js"></script>
</body>
</html>
